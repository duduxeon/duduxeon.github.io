<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sinal Retro</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; color: #fff; overflow: hidden; }
        #container { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; text-align: center; position: absolute; z-index: 10; background: #000; }
        #game-area { width: 100vw; height: 100vh; display: none; position: relative; z-index: 1; }
        .btn-start { padding: 20px 40px; border: 2px solid #1AAFFF; background: transparent; color: #1AAFFF; font-size: 1.5rem; cursor: pointer; }
    </style>
</head>
<body>
    <div id="container">
        <button class="btn-start" id="start-btn">PRESS START</button>
        <p style="margin-top:15px; color:#444;">Sistema Eduardo Dias Tech</p>
    </div>
    <!-- O segredo está aqui: o container precisa de ID e dimensões explícitas -->
    <div id="game-area"></div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const romName = params.get("rom");
        const system = params.get("system") || "snes";

        document.getElementById("start-btn").onclick = function() {
            if (!romName) return alert("Erro: ROM ausente");

            document.getElementById("container").style.display = "none";
            document.getElementById("game-area").style.display = "block";

            window.EJS_player = "#game-area";
            window.EJS_core = system;
            window.EJS_gameUrl = 'https://duduxeon.github.io/' + romName;
            window.EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";
            window.EJS_startOnLoaded = true;

            const script = document.createElement("script");
            script.src = window.EJS_pathtodata + "loader.js";
            document.body.appendChild(script);
        };
    </script>
</body>
</html>
