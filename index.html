<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sinal Retro</title>
    <style>
        /* Força o corpo a ocupar a tela inteira sem scroll */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        
        /* Camada de Interação */
        #ui-layer { 
            position: absolute; width: 100%; height: 100%; display: flex; 
            flex-direction: column; align-items: center; justify-content: center; 
            z-index: 100; background: radial-gradient(circle, #1a1a1a, #000); 
        }

        /* Área do Jogo: Ocupa tudo e garante visibilidade */
        #game-area { 
            position: absolute; top: 0; left: 0; width: 100vw !important; 
            height: 100vh !important; z-index: 10; display: none; 
        }

        .btn-start { 
            padding: 20px 40px; border: 3px solid #1AAFFF; background: transparent; 
            color: #1AAFFF; font-size: 22px; font-weight: bold; cursor: pointer; 
            box-shadow: 0 0 15px #1AAFFF; text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <button class="btn-start" id="play-btn">Press Start</button>
        <p style="color: #444; margin-top: 20px; font-family: monospace;">EDU DIAS TECH - V1.0</p>
    </div>

    <div id="game-area"></div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const rom = params.get("rom");
        const sys = params.get("system") || "snes";

        document.getElementById("play-btn").onclick = function() {
            if (!rom) return alert("Erro: ROM não detectada.");

            // Troca de camadas
            document.getElementById("ui-layer").style.setProperty('display', 'none', 'important');
            document.getElementById("game-area").style.display = "block";

            // Configuração do EmulatorJS
            window.EJS_player = "#game-area";
            window.EJS_core = sys;
            window.EJS_gameUrl = 'https://duduxeon.github.io/' + rom;
            window.EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";
            window.EJS_startOnLoaded = true;
            window.EJS_browserMode = "mobile";

            const script = document.createElement("script");
            script.src = window.EJS_pathtodata + "loader.js";
            document.body.appendChild(script);
        };
    </script>
</body>
</html>
