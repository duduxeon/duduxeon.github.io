<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal Retro</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background-color: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        .loader { border: 4px solid #333; border-top: 4px solid #1AAFFF; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #game-area { width: 100%; height: 100%; display: none; }
    </style>
</head>
<body>

    <div id="container">
        <div class="loader"></div>
        <p id="status">Iniciando sistema...</p>
    </div>

    <div id="game-area"></div>

    <script>
        // 1. Configurações de Parâmetros
        const params = new URLSearchParams(window.location.search);
        const romName = params.get("rom"); // Ex: files/g01.smc
        const system = params.get("system") || "snes";

        // 2. Configurações do Emulador
        window.EJS_player = "#game-area";
        window.EJS_core = system;
        
        // Concatena seu domínio com o caminho da ROM vindo da URL
        window.EJS_gameUrl = 'https://duduxeon.github.io/' + romName;
        
        // Caminho dos núcleos (usando CDN para evitar Erro de Rede local)
        window.EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";
        
        window.EJS_startOnLoaded = true;
        window.EJS_browserMode = "mobile";
        window.EJS_cacheConfig = { enabled: true, cacheMaxSizeMB: 500 };

        // 3. Execução
        if (romName) {
            document.addEventListener("DOMContentLoaded", function() {
                const script = document.createElement("script");
                script.src = window.EJS_pathtodata + "loader.js";
                script.onload = () => {
                    document.getElementById("container").style.display = "none";
                    document.getElementById("game-area").style.display = "block";
                };
                document.body.appendChild(script);
            });
        } else {
            document.getElementById("status").innerText = "Aguardando sinal NFC...";
        }
    </script>
</body>
</html>
